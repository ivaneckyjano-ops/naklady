<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Skener - Náklady</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .content {
            padding: 30px;
        }
        
        .scanner-box {
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: none;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .info-text {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
        
        .nav-links {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
        }
        
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 QR Skener</h1>
            <p>Naskenuj bločku z obchodu</p>
        </div>
        
        <div class="content">
            <div id="message" class="message"></div>
            
            <div class="scanner-box">
                <video id="video" playsinline></video>
                <div id="scanner-hint">
                    <p style="font-size: 48px; margin-bottom: 10px;">📱</p>
                    <p>Klikni na tlačidlo nižšie a naskenuj QR kód</p>
                </div>
            </div>
            
            <div class="buttons">
                <button class="btn-primary" id="startBtn">🎥 Spustiť skener</button>
                <button class="btn-secondary" id="stopBtn" style="display:none;">⏹ Zastaviť</button>
            </div>

            <!-- Upload from gallery (mobile) -->
            <div class="form-group">
                <label for="fileInput">Alebo nahraj fotku bločku z galérie</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            
            <form id="expenseForm">
                <div class="form-group">
                    <label for="amount">Suma (€) *</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="napr. 25.50" required>
                </div>
                
                <div class="form-group">
                    <label for="store">Obchod (napr. LIDL, KAUFLAND) *</label>
                    <input type="text" id="store" name="store" placeholder="napr. LIDL" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Kategória *</label>
                    <select id="category" name="category" required>
                        <option value="">-- Vyber kategóriu --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="description">Popis (voliteľné)</label>
                    <input type="text" id="description" name="description" placeholder="napr. Nákup potravín">
                </div>
                
                <button type="submit" class="btn-primary">✅ Uložiť výdavok</button>
            </form>
            
            <div class="nav-links">
                <a href="/">← Späť na hlavnú stránku</a>
                <a href="/stores">Prehľad obchodov →</a>
            </div>
        </div>
    </div>
    
    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const messageDiv = document.getElementById('message');
        const expenseForm = document.getElementById('expenseForm');
        const amountInput = document.getElementById('amount');
        const storeInput = document.getElementById('store');
        const categorySelect = document.getElementById('category');
        const fileInput = document.getElementById('fileInput');
        
        let stream = null;
        
        // Načítaj kategórie
        async function loadCategories() {
            try {
                const response = await fetch('/api/categories/flat');
                const categories = await response.json();
                
                categorySelect.innerHTML = '<option value="">-- Vyber kategóriu --</option>';
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.is_subcategory ? `  → ${cat.name}` : cat.name;
                    categorySelect.appendChild(option);
                });
            } catch (error) {
                console.error('Chyba pri načítaní kategórií:', error);
            }
        }
        
        // Spusti skener
        startBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('scanner-hint').style.display = 'none';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                
                // Čítaj QR kódy
                scanQRCode();
            } catch (error) {
                showMessage('Chyba pri prístupe ku kamera: ' + error.message, 'error');
            }
        });
        
        // Zastav skener
        stopBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.style.display = 'none';
            document.getElementById('scanner-hint').style.display = 'block';
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
        });
        
        // Skener QR kódov (pravidelne)
        function scanQRCode() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            function capture() {
                if (!video.srcObject) return;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0);
                
                // Odošli obrázok na server na dekódovanie
                canvas.toBlob(async (blob) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const response = await fetch('/api/qr/decode', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ image: e.target.result })
                            });
                            
                            if (response.ok) {
                                const data = await response.json();
                                
                                // Vyplň formulár s údajmi z QR kódu
                                amountInput.value = data.amount || '';
                                storeInput.value = data.store || '';
                                if (data.category_id) {
                                    categorySelect.value = data.category_id;
                                }
                                
                                showMessage(`✅ QR kód načítaný: ${data.store} - ${data.amount}€`, 'success');
                                
                                // Zastav skener
                                stopBtn.click();
                            }
                        } catch (error) {
                            // Skúšaj znovu
                        }
                    };
                    reader.readAsDataURL(blob);
                }, 'image/png');
                
                if (video.srcObject) {
                    setTimeout(capture, 500); // Skúšaj každých 500ms
                }
            }
            
            capture();
        }

        // Upload from gallery: read file and send to decode endpoint
        if (fileInput) {
            fileInput.addEventListener('change', (ev) => {
                const file = ev.target.files && ev.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const response = await fetch('/api/qr/decode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: e.target.result })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            amountInput.value = data.amount || '';
                            storeInput.value = data.store || '';
                            if (data.category_id) categorySelect.value = data.category_id;
                            showMessage(`✅ QR z obrázka: ${data.store} - ${data.amount}€`, 'success');
                        } else {
                            const err = await response.json();
                            showMessage('❌ ' + (err.error || 'Nepodarilo sa dekódovať obrázok'), 'error');
                        }
                    } catch (err) {
                        showMessage('❌ Chyba pri spracovaní obrázka', 'error');
                    }
                };
                reader.readAsDataURL(file);
            });
        }
        
        // Odošli formulár
        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                amount: parseFloat(amountInput.value),
                store: storeInput.value.toUpperCase(),
                category_id: parseInt(categorySelect.value),
                description: document.getElementById('description').value,
                date: new Date().toISOString().split('T')[0]
            };
            
            try {
                const response = await fetch('/api/expenses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showMessage('✅ Výdavok úspešne uložený!', 'success');
                    expenseForm.reset();
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    const error = await response.json();
                    showMessage('❌ Chyba: ' + error.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Chyba pri odoslaní: ' + error.message, 'error');
            }
        });
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }
        
        // Načítaj kategórie pri otvorení stránky
        loadCategories();
    </script>
</body>
</html>
