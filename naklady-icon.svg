<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="url(#grad)"/>
  
  <!-- Money bag -->
  <circle cx="128" cy="100" r="50" fill="white" opacity="0.2"/>
  <rect x="88" y="100" width="80" height="70" rx="5" fill="white"/>
  
  <!-- Coin slots -->
  <circle cx="110" cy="110" r="8" fill="#667eea"/>
  <circle cx="128" cy="110" r="8" fill="#667eea"/>
  <circle cx="146" cy="110" r="8" fill="#667eea"/>
  
  <!-- Money symbol -->
  <text x="128" y="155" font-size="50" font-weight="bold" text-anchor="middle" fill="#667eea" font-family="Arial">€</text>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="80" r="15" fill="white" opacity="0.3"/>
  <circle cx="50" cy="180" r="20" fill="white" opacity="0.2"/>
</svg>
